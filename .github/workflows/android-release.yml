name: Android Release Build

on:
  push:
    branches:
      - main # Change this to your production branch
  workflow_dispatch:

jobs:
  build:
    name: Build and Upload to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.1" # Change to your Flutter version

      - name: Install Dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 --decode > android/app/upload-keystore.jks
          echo "Keystore size:"
          ls -la android/app/upload-keystore.jks
          echo "File type:"
          file android/app/upload-keystore.jks
          echo "SHA256:"
          sha256sum android/app/upload-keystore.jks
          echo "Verifying with keytool:"
          keytool -list -keystore android/app/upload-keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | head -20 || echo "keytool verification failed"

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release --flavor prod -t lib/main_prod.dart

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.pixeloid.eventapp
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: production
          status: completed
